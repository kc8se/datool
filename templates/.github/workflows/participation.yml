name: Participation Stats

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  stats:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for git blame

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run datool
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -o pipefail
          PR_NUMBER=${{ github.event.pull_request.number }}
          ANNOTATE_FLAG=""
          if [ -n "$PR_NUMBER" ]; then ANNOTATE_FLAG="--annotate-pr $PR_NUMBER"; fi
          python .github/scripts/datool.py --github $ANNOTATE_FLAG . | tee stats.txt
          echo "## Participation Stats" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat stats.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
